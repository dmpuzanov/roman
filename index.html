<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">

<style>
*{margin:0;padding:0;box-sizing:border-box}
body{
  background-color: #050505; /* ГЛУБОКИЙ ЧИСТЫЙ ЧЕРНЫЙ ФОН */
  color:#e0d5b0;
  font-family:'Literatta',Georgia,serif;
  min-height:100vh;
  overflow-x:hidden;
  overflow-y:auto;
  display:flex;
  flex-direction:column;
}

/* УЗКАЯ ЧЕРНАЯ ПОЛОСКА МЕНЮ СВЕРХУ */
.top-navbar {
  position: fixed;
  top: 0;
  left: 0;
  right: 0;
  height: 55px;
  background: #000000;
  border-bottom: 1px solid rgba(201, 169, 110, 0.15);
  display: flex;
  justify-content: center;
  align-items: center;
  gap: 2.5rem;
  z-index: 150;
}
.nav-link {
  color: #8A7E6B;
  font-family: 'Literatta', Georgia, serif;
  font-size: 0.85rem;
  letter-spacing: 0.15em;
  text-transform: uppercase;
  text-decoration: none;
  transition: color 0.3s ease;
  cursor: pointer;
  background: transparent;
  border: none;
  outline: none;
}
.nav-link:hover {
  color: #C9A96E;
}

/* ГЛАВНЫЙ КОНТЕЙНЕР (СДВИГАЕМ НА 55px ВНИЗ ПОД МЕНЮ) */
.main-wrapper {
  display: flex;
  width: 100%;
  max-width: 1200px;
  margin: 55px auto 0;
  padding: 3rem 1.5rem;
  align-items: center;
  justify-content: center;
  z-index: 10;
  animation: fadeIn 1.8s ease-out;
}

/* АДАПТИВНЫЙ КОНТЕЙНЕР ДЛЯ КАРТИНЫ И КНОПКИ */
.image-container {
  position: relative;
  width: 100%;
  max-width: 1100px;
  display: inline-block;
}

/* ОСНОВНАЯ КАРТИНА 85.png */
.main-image {
  display: block;
  width: 100%;
  height: auto;
  border: 1px solid rgba(201, 169, 110, 0.25);
  box-shadow: 0 0 70px rgba(201, 169, 110, 0.08);
}

/* ПОЗИЦИОНИРОВАНИЕ СГЕНЕРИРОВАННОЙ КНОПКИ */
.read-btn-position {
  position: absolute;
  left: 10.8%; /* Выравниваем ровно по левому краю текста на картинке */
  bottom: 4%; /* СДЕЛАЛИ ОТСТУП НИЖЕ, ЧТОБЫ ОТДАЛИТЬ ОТ БУКВ */
  z-index: 10;
}

/* СТИЛИЗАЦИЯ СГЕНЕРИРОВАННОЙ КНОПКИ */
.custom-read-btn {
  display: inline-block;
  padding: 0.75rem 2.2rem;
  background: rgba(11, 10, 8, 0.55); /* Полупрозрачный фон, сквозь который дышит дым */
  border: 1.5px solid rgba(201, 169, 110, 0.5); /* Тонкая золотистая рамка */
  color: #C9A96E;
  font-family: 'Literatta', Georgia, serif;
  font-size: 0.92rem;
  letter-spacing: 0.18em;
  text-transform: uppercase;
  text-decoration: none;
  transition: all 0.3s ease;
  cursor: pointer;
  box-shadow: 0 4px 15px rgba(0, 0, 0, 0.4);
}
.custom-read-btn:hover {
  background: #C9A96E;
  color: #0b0a08;
  box-shadow: 0 0 25px rgba(201, 169, 110, 0.35);
  transform: translateY(-1px);
}

/* МОДАЛЬНОЕ ОКНО КОНТАКТОВ */
.modal-overlay {
  position: fixed;
  inset: 0;
  background: rgba(11, 10, 8, 0.88);
  backdrop-filter: blur(10px);
  -webkit-backdrop-filter: blur(10px);
  display: flex;
  align-items: center;
  justify-content: center;
  opacity: 0;
  pointer-events: none;
  transition: opacity 0.3s ease;
  z-index: 200;
}
.modal-overlay.show {
  opacity: 1;
  pointer-events: auto;
}
.modal-card {
  background: #0b0a08;
  border: 1px solid #C9A96E;
  padding: 3rem 2.5rem 2.5rem;
  max-width: 500px;
  width: 100%;
  box-shadow: 0 0 60px rgba(201, 169, 110, 0.15);
  position: relative;
  transform: translateY(20px);
  transition: transform 0.3s ease;
}
.modal-overlay.show .modal-card {
  transform: translateY(0);
}
.modal-close {
  position: absolute;
  top: 1rem;
  right: 1.2rem;
  background: transparent;
  border: none;
  color: #8A7E6B;
  font-size: 1.5rem;
  cursor: pointer;
  transition: color 0.3s;
}
.modal-close:hover {
  color: #C9A96E;
}
.modal-card h3 {
  font-family: 'Oranienbaum', Georgia, serif;
  color: #C9A96E;
  font-size: 1.5rem;
  margin-bottom: 0.5rem;
  letter-spacing: 0.05em;
  text-align: center;
}
.modal-card p {
  color: #8A7E6B;
  margin-bottom: 1.5rem;
  font-size: 0.9rem;
  line-height: 1.4;
  text-align: center;
}

/* БЛАНК ШИФРОВКИ */
.feedback-form {
  display: flex;
  flex-direction: column;
  gap: 1rem;
}
.feedback-form input, .feedback-form textarea {
  background: #161512;
  border: 1px solid rgba(201, 169, 110, 0.25);
  color: #e0d5b0;
  font-family: 'Literatta', Georgia, serif;
  padding: 0.75rem;
  font-size: 0.95rem;
  outline: none;
  transition: border-color 0.3s;
}
.feedback-form input:focus, .feedback-form textarea:focus {
  border-color: #C9A96E;
}
.feedback-form textarea {
  resize: vertical;
  min-height: 100px;
}
.form-submit {
  padding: 0.8rem;
  background: transparent;
  border: 1px solid #C9A96E;
  color: #C9A96E;
  font-family: 'Literatta', Georgia, serif;
  text-transform: uppercase;
  letter-spacing: 0.1em;
  cursor: pointer;
  transition: 0.3s;
}
.form-submit:hover {
  background: #C9A96E;
  color: #0b0a08;
}

@keyframes fadeIn {
  from { opacity: 0; transform: scale(0.99); }
  to { opacity: 1; transform: scale(1); }
}

    padding: 2rem 1.5rem;
  }
  .left-pane, .right-pane {
    width: 100%;
    max-width: 100%;
    flex: none;
    min-height: auto;
  }
