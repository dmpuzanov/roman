<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Второй звонок — Дмитрий Ильин</title>
<link rel="icon" href="images/51.png" type="image/png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Oranienbaum&family=Literatta:opsz,wght@6..72,300;6..72,400;6..72,500;6..72,600;6..72,700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{
  background:#0b0a08 url('images/62.png') no-repeat center center fixed;
  background-size: cover;
  color:#e0d5b0;
  font-family:'Literatta',Georgia,serif;
  min-height:100vh;
  overflow-x:hidden;
  overflow-y:auto; /* РАЗРЕШАЕМ ПРОКРУТКУ ПО УМОЛЧАНИЮ */
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
}

/* ЦЕНТРАЛЬНЫЙ БЛОК */
.main-container {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 3rem 2rem;
  max-width: 900px;
  width: 100%;
  z-index: 10;
  transform: translateY(-2%); /* СЛЕГКА ПРИПОДНИМАЕМ ДЛЯ БАЛАНСА */
  animation: fadeIn 1.8s ease-out;
}

/* ПЛАШКА С НАЗВАНИЕМ КНИГИ */
.main-banner {
  max-width: 100%;
  width: 680px; /* ОГРАНИЧИЛИ МАКСИМАЛЬНУЮ ШИРИНУ ПЛАШКИ */
  height: auto;
  border: 1px solid rgba(201, 169, 110, 0.3);
  box-shadow: 0 0 70px rgba(201, 169, 110, 0.08);
  transition: box-shadow 0.5s ease;
  margin-bottom: 1.8rem;
}
.main-banner:hover {
  box-shadow: 0 0 90px rgba(201, 169, 110, 0.15);
}

/* КНОПКИ-ИЗОБРАЖЕНИЯ */
.btn-img {
  display: block;
  max-width: 100%;
  height: auto;
  border: 1px solid rgba(201, 169, 110, 0.25);
  box-shadow: 0 0 30px rgba(0, 0, 0, 0.5);
  transition: transform 0.3s ease, box-shadow 0.3s ease, border-color 0.3s ease;
}
.btn-img:hover {
  border-color: #C9A96E;
  box-shadow: 0 0 45px rgba(201, 169, 110, 0.2);
  transform: scale(1.02);
}

/* ССЫЛКА ДЛЯ ГЛАВНОЙ КНОПКИ */
.main-btn-link {
  display: block;
  width: 100%;
  max-width: 340px; /* УМЕНЬШИЛИ ГЛАВНУЮ КНОПКУ ДО 340px */
  margin-bottom: 1.8rem;
}

/* НИЖНИЙ РЯД ИЗ ТРЕХ КНОПОК */
.bottom-row {
  display: flex;
  gap: 1.5rem;
  justify-content: center;
  width: 100%;
}
.sub-btn-link {
  display: block;
  flex: 1;
  max-width: 160px; /* УМЕНЬШИЛИ БОКОВЫЕ КНОПКИ ДО 160px */
}

@keyframes fadeIn {
  from { opacity: 0; transform: translateY(-1%) scale(0.98); }
  to { opacity: 1; transform: translateY(-2%) scale(1); }
}

@media(max-width: 768px) {
  .main-container {
    padding: 2rem 1.5rem;
  }
  .bottom-row {
    flex-direction: column;
    align-items: center;
    gap: 1rem;
  }
  .main-btn-link, .sub-btn-link {
    width: 100%;
    max-width: 280px; /* На мобильных центрируем по единой ширине */
  }
}
</style>
</head>
<body oncontextmenu="return false;">

<div class="main-container">
  <!-- Главная плашка 63.png по центру -->
  <img src="images/63.png" alt="Второй звонок — Дмитрий Ильин" class="main-banner">
  
  <!-- Главная кнопка сразу под плашкой -->
  <a href="reader.html" class="main-btn-link">
    <img src="images/64.png" alt="Ознакомиться с текстом" class="btn-img">
  </a>
  
  <!-- Нижний ряд из трех кнопок -->
  <div class="bottom-row">
    <a href="materials.html" class="sub-btn-link">
      <img src="images/65.png" alt="Архив дела" class="btn-img">
    </a>
    <a href="foreigners.html" class="sub-btn-link">
      <img src="images/66.png" alt="For Foreigners" class="btn-img">
    </a>
    <a href="laboratory.html" class="sub-btn-link">
      <img src="images/67.png" alt="Лаборатория" class="btn-img">
    </a>
  </div>
</div>

</body>
</html>
