<!DOCTYPE html>
<html lang="ru">
<head>

    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Плашка — Второй звонок</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background: #0b0a08;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .wrapper {
            max-width: 800px;
            width: 100%;
            border: 2px solid #d4af37;
            box-shadow: 0 0 60px rgba(212, 175, 55, 0.15);
            padding: 10px;
            background: #0b0a08;
        }
        img {
            display: block;
            width: 100%;
            height: auto;
        }
    </style>
</head>
<body>
    <div class="wrapper">
        <img src="https://z-cdn-media.chatglm.cn/files/3050fced-d264-4ffc-be3e-bbd460c7634a.png?auth_key=1882532794-8f062fb7397e47dca272ac89220d4167-0-685ac714cbea6a59cda77efa3abe4f47" alt="Второй звонок — обложка">
    </div>

</html>
