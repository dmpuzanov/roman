<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Второй звонок — Дмитрий Ильин</title>
<meta name="description" content="Интеллектуальный шпионский нуар. Декабрь 1946 — Май 1948.">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Oranienbaum&family=Literatta:opsz,wght@6..72,300;6..72,400;6..72,500;6..72,600;6..72,700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{
  background:#0b0a08 url('images/62.png') no-repeat center center fixed;
  background-size: cover;
  color:#e0d5b0;
  font-family:'Literatta',Georgia,serif;
  min-height:100vh;
  overflow:hidden;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
}

/* ЦЕНТРАЛЬНЫЙ БЛОК */
.main-container {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 2rem;
  max-width: 900px;
  width: 100%;
  z-index: 10;
  transform: translateY(-5%); /* СМЕЩАЕМ КАРТИНКУ И КНОПКИ ЧУТЬ НАВЕРХ */
  animation: fadeIn 1.8s ease-out;
}

/* ПЛАШКА С НАЗВАНИЕМ */
.main-banner {
  max-width: 100%;
  height: auto;
  border: 1px solid rgba(201, 169, 110, 0.3);
  box-shadow: 0 0 70px rgba(201, 169, 110, 0.08);
  transition: box-shadow 0.5s ease;
}
.main-banner:hover {
  box-shadow: 0 0 90px rgba(201, 169, 110, 0.15);
}

/* БЛОК КНОПОК */
.button-group {
  margin-top: 2.5rem;
  display: flex;
  gap: 1.2rem;
  flex-wrap: wrap;
  justify-content: center;
  width: 100%;
}

.nav-btn {
  padding: 0.9rem 1.8rem;
  background: rgba(11, 10, 8, 0.6); /* Полупрозрачный фон, чтобы сквозь него слегка дышал дым */
  border: 1px solid #C9A96E;
  color: #C9A96E;
  font-family: 'Literatta', Georgia, serif;
  font-size: 0.9rem;
  letter-spacing: 0.12em;
  cursor: pointer;
  transition: 0.3s ease;
  text-transform: uppercase;
  text-decoration: none;
  white-space: nowrap;
}
.nav-btn:hover {
  background: #C9A96E;
  color: #0b0a08;
}

/* ФУТЕР */
.footer {
  position: absolute;
  bottom: 2rem;
  text-align: center;
  color: #8A7E6B;
  font-size: 0.8rem;
  letter-spacing: 0.05em;
  z-index: 10;
}

@keyframes fadeIn {
  from { opacity: 0; transform: translateY(-3%) scale(0.98); }
  to { opacity: 1; transform: translateY(-5%) scale(1); }
}

@media(max-width: 768px) {
  .button-group {
    flex-direction: column;
    width: 100%;
    padding: 0 1.5rem;
    gap: 1rem;
  }
  .nav-btn {
    width: 100%;
    text-align: center;
    padding: 0.8rem;
  }
  body {
    overflow-y: auto; /* На маленьких экранах разрешаем прокрутку, если кнопки не влезают */
  }
}
</style>
</head>
<body>

<!-- ГЛАВНЫЙ КОНТЕНТ -->
<div class="main-container">
  <!-- Картинка 63.png по центру -->
  <img src="images/63.png" alt="Второй звонок — Дмитрий Ильин" class="main-banner">
  
  <div class="button-group">
    <!-- Кнопки входа в архитектурные разделы -->
    <a href="reader.html" class="nav-btn">Ознакомиться с текстом</a>
    <a href="materials.html" class="nav-btn">Архив дела</a>
    <a href="foreigners.html" class="nav-btn">For Foreigners</a>
    <a href="laboratory.html" class="nav-btn">Лаборатория проекта</a>
  </div>
</div>

<footer class="footer">
  <p>© Дмитрий Ильин. Все права защищены. Свидетельство № 226061100096</p>
</footer>

</body>
</html>
