<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">

<title>Второй звонок — Дмитрий Ильин</title>
<link rel="icon" href="images/51.png" type="image/png">
<link rel="preconnect" href="https://fonts.googleapis.com">

<style>
*{margin:0;padding:0;box-sizing:border-box}
body{
  background-color: #0b0a08;
  color:#e0d5b0;
  font-family:'Literatta',Georgia,serif;
  min-height:100vh;
  overflow-x:hidden;
  overflow-y:auto;
  display:flex;
  flex-direction:column;
}

/* ФОНОВЫЙ КОНТЕЙНЕР (НАЧИНАЕТСЯ ПОД ПОЛОСКОЙ МЕНЮ) */
.bg-container {
  position: fixed;
  top: 55px;
  left: 0;
  right: 0;
  bottom: 0;
  background: url('images/81.png') no-repeat center center;
  background-size: cover;
  z-index: -100;
}

/* УЗКАЯ ЧЕРНАЯ ПОЛОСКА МЕНЮ СВЕРХУ */
.top-navbar {
  position: fixed;
  top: 0;
  left: 0;
  right: 0;
  height: 55px;
  background: #000000;
  border-bottom: 1px solid rgba(201, 169, 110, 0.15);
  display: flex;
  justify-content: center;
  align-items: center;
  gap: 2.5rem;
  z-index: 150;
}
.nav-link {
  color: #8A7E6B;
  font-family: 'Literatta', Georgia, serif;
  font-size: 0.85rem;
  letter-spacing: 0.15em;
  text-transform: uppercase;
  text-decoration: none;
  transition: color 0.3s ease;
  cursor: pointer;
  background: transparent;
  border: none;
  outline: none;
}
.nav-link:hover {
  color: #C9A96E;
}

/* ГЛАВНЫЙ КОНТЕЙНЕР (СДВИГАЕМ НА 55px ВНИЗ ПОД МЕНЮ) */
.main-wrapper {
  display: flex;
  width: 100%;
  max-width: 1200px;
  margin: 55px auto 0;
  padding: 3rem 1.5rem;
  align-items: center;
  justify-content: center;
  z-index: 10;
  animation: fadeIn 1.8s ease-out;
}

/* АДАПТИВНЫЙ КОНТЕЙНЕР ДЛЯ КАРТИНЫ И КНОПКИ */
.image-container {
  position: relative;
  width: 100%;
  max-width: 1100px;
  display: inline-block;
}

/* ОСНОВНАЯ КАРТИНА 85.png */
.main-image {
  display: block;
  width: 100%;
  height: auto;
  border: 1px solid rgba(201, 169, 110, 0.25);
  box-shadow: 0 0 70px rgba(201, 169, 110, 0.08);
}

/* ПОЗИЦИОНИРОВАНИЕ СГЕНЕРИРОВАННОЙ КНОПКИ */
.read-btn-position {
  position: absolute;
  left: 10.8%; /* Выравниваем ровно по левому краю текста на картинке */
